# Receivers that agent needs to tests
receivers: ["system"]

#Test case name
test_case: "journald_feature_regex_logs"
validate_type: "feature"
data_type: "logs"
number_monitored_logs: 1
values_per_minute: "2"
agent_collection_period: 60
cloudwatch_agent_config: "<cloudwatch_agent_config>"
metric_namespace: "CloudWatchAgentJournaldFeature"
metric_validation:
log_validation:
  - log_value: "Database connection failed"
    log_level: "err"
    log_lines: 1
    log_channel: "cwagent-journald-test"
    log_stream: "journald-regex1"
    log_source: "Journald"
  - log_value: "Authentication failed for user admin"
    log_level: "warning"
    log_lines: 1
    log_channel: "cwagent-journald-test"
    log_stream: "journald-regex1"
    log_source: "Journald"
  - log_value: "Authentication failed for user admin"
    log_level: "warning"
    log_lines: 0
    log_channel: "cwagent-journald-test"
    log_stream: "journald-regex2"
    log_source: "Journald"
  - log_value: "user login successful"
    log_level: "info"
    log_lines: 1
    log_channel: "cwagent-journald-test"
    log_stream: "journald-regex2"
    log_source: "Journald"
  - log_value: "Service started successfully"
    log_level: "info"
    log_lines: 1
    log_channel: "cwagent-journald-test"
    log_stream: "journald-regex3"
    log_source: "Journald"
  - log_value: "CWAgent supports regex"
    log_level: "info"
    log_lines: 1
    log_channel: "cwagent-journald-test"
    log_stream: "journald-regex3"
    log_source: "Journald"
  - log_value: "CWAgent has stopped"
    log_level: "info"
    log_lines: 0
    log_channel: "cwagent-journald-test"
    log_stream: "journald-regex3"
    log_source: "Journald"
