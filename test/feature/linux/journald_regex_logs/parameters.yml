# Receivers that agent needs to tests
receivers: ["system"]

#Test case name
test_case: "journald_feature_regex_logs"
validate_type: "feature"
data_type: "logs"
number_monitored_logs: 1
values_per_minute: "2"
agent_collection_period: 90
cloudwatch_agent_config: "<cloudwatch_agent_config>"
metric_namespace: "CloudWatchAgentJournaldFeature"
metric_validation:
log_validation:
  - log_value: "error"
    log_lines: 1
    log_stream: "journald-regex"
    log_source: "Journald"
  - log_value: "Could not load"
    log_lines: 1
    log_stream: "journald-regex"
    log_source: "Journald"
