# Receivers that agent needs to tests
receivers: ["system"]

#Test case name
test_case: "journald_feature_priority_logs"
validate_type: "feature"
data_type: "logs"
number_monitored_logs: 1
values_per_minute: "2"
agent_collection_period: 60
cloudwatch_agent_config: "<cloudwatch_agent_config>"
metric_namespace: "CloudWatchAgentJournaldFeature"
metric_validation:
log_validation:
  - log_value: "Journald info priority log"
    log_level: "info"
    log_lines: 1
    log_channel: "cwagent-journald-test"
    log_stream: "journald-info"
    log_source: "Journald"
  - log_value: "Journald err priority log"
    log_level: "err"
    log_lines: 1
    log_channel: "cwagent-journald-test"
    log_stream: "journald-err"
    log_source: "Journald"
  - log_value: "Journald warning priority log"
    log_level: "warning"
    log_lines: 1
    log_channel: "cwagent-journald-test"
    log_stream: "journald-warning"
    log_source: "Journald"
